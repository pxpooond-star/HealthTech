<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - รายงานผลการออกกำลังกาย</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; color: #333; }
    
    .header { background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; padding: 40px 20px; text-align: center; border-radius: 0 0 30px 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); margin-bottom: 40px;}
    .header h1 { margin: 0; font-size: 32px; font-weight: 600; letter-spacing: 1px;}
    .header p { margin: 10px 0 0 0; font-size: 16px; font-weight: 300; opacity: 0.9; }

    .container { max-width: 1000px; margin: auto; padding: 0 20px 50px 20px; }
    
    .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    .card h3 { color: #2E7D32; font-size: 20px; margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px; margin-bottom: 20px; }
    
    .stat-box { display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 20px 0;}
    .stat-number { font-size: 70px; font-weight: bold; color: #4CAF50; line-height: 1; }
    .stat-label { font-size: 18px; color: #666; margin-top: 5px; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
    .chart-container { position: relative; height: 250px; width: 100%; display: flex; justify-content: center; align-items: center;}
    
    #loading { text-align: center; padding: 50px; font-size: 22px; color: #666; }
    #dashboardContent { display: none; }

    @media (max-width: 768px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header" data-aos="fade-down">
    <h1>📊 Dashboard รายงานผล</h1>
    <p>โปรแกรมการออกกำลังกายเพื่อป้องกันการหกล้มในผู้สูงอายุ</p>
  </div>

  <div id="loading">⏳ กำลังประมวลผลข้อมูล โปรดรอสักครู่...</div>

  <div class="container" id="dashboardContent">
    
    <div class="card" data-aos="fade-up">
      <h3>👥 จำนวนผู้เข้าใช้งานระบบ</h3>
      <div class="stat-box">
        <div class="stat-number" id="txtTotalUsers">0</div>
        <div class="stat-label">คน</div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card" data-aos="fade-up" data-aos-delay="100">
        <h3>⚧️ สัดส่วนเพศ</h3>
        <div class="chart-container"><canvas id="genderChart"></canvas></div>
      </div>

      <div class="card" data-aos="fade-up" data-aos-delay="200">
        <h3>🎂 จำนวนผู้ใช้งานแยกตามช่วงอายุ</h3>
        <div class="chart-container"><canvas id="ageChart"></canvas></div>
      </div>
    </div>

    <div class="card" data-aos="fade-up">
      <h3>⭐ สรุปคะแนนการออกกำลังกายสะสม</h3>
      <div class="chart-container" style="height: 300px;"><canvas id="scoreChart"></canvas></div>
    </div>

    <div class="card" data-aos="fade-up">
      <h3>📋 สรุปผลความเสี่ยงจากการทำแบบประเมิน (ก่อนเข้าโปรแกรม)</h3>
      <div class="chart-container" style="height: 300px;"><canvas id="preRiskChart"></canvas></div>
    </div>

  </div>

  <script>
    // 🔴 วาง URL จาก Code.gs ที่ได้จากการ Deploy 🔴
    const apiUrl = "https://script.google.com/macros/s/AKfycbzuu6Dwz15Wj01CFephqkiR6a2OLfU3gLNVdx1zWAjjp1PdfY9xTxqSGiFNcM3fe-iGcg/exec";

    AOS.init({ duration: 800, once: true });

    const colors = {
      blue: 'rgba(54, 162, 235, 0.8)',
      pink: 'rgba(255, 99, 132, 0.8)',
      green: 'rgba(76, 175, 80, 0.8)',
      yellow: 'rgba(255, 206, 86, 0.8)',
      orange: 'rgba(255, 152, 0, 0.8)',
      red: 'rgba(244, 67, 54, 0.8)',
      gray: 'rgba(201, 203, 207, 0.8)'
    };

    window.onload = function() {
      fetch(apiUrl, {
        method: 'POST',
        body: JSON.stringify({ action: "getDashboardData" })
      })
      .then(res => res.json())
      .then(data => {
        if(data.status === "success") {
          document.getElementById('loading').style.display = "none";
          document.getElementById('dashboardContent').style.display = "block";
          renderDashboard(data.data);
        } else {
          alert("เกิดข้อผิดพลาดในการดึงข้อมูล");
        }
      })
      .catch(err => alert("การเชื่อมต่อมีปัญหา"));
    };

    function renderDashboard(db) {
      document.getElementById('txtTotalUsers').innerText = db.totalUsers;

      new Chart(document.getElementById('genderChart'), {
        type: 'pie',
        data: {
          labels: ['ชาย', 'หญิง'],
          datasets: [{ data: [db.gender.male, db.gender.female], backgroundColor: [colors.blue, colors.pink], borderWidth: 0 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
      });

      new Chart(document.getElementById('ageChart'), {
        type: 'bar',
        data: {
          labels: ['< 60 ปี', '60-69 ปี', '70-79 ปี', '80 ปีขึ้นไป'],
          datasets: [{ label: 'จำนวนผู้ใช้งาน (คน)', data: [db.ageGroups.under60, db.ageGroups.g60, db.ageGroups.g70, db.ageGroups.over80], backgroundColor: colors.yellow, borderRadius: 5 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      new Chart(document.getElementById('scoreChart'), {
        type: 'bar',
        data: {
          labels: ['0-4 แต้ม', '5-104 แต้ม', '105+ แต้ม'],
          datasets: [{ label: 'จำนวนผู้ใช้งาน (คน)', data: [db.scores.low, db.scores.med, db.scores.high], backgroundColor: [colors.gray, colors.blue, colors.green], borderRadius: 5 }]
        },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });

      new Chart(document.getElementById('preRiskChart'), {
        type: 'bar',
        data: {
          labels: ['เสี่ยงต่ำ (0-5 คะแนน)', 'เสี่ยงปานกลาง (6-10 คะแนน)', 'เสี่ยงสูง (11-17 คะแนน)'],
          datasets: [{ label: 'จำนวนผู้ใช้งาน (คน)', data: [db.preRisk.low, db.preRisk.med, db.preRisk.high], backgroundColor: [colors.green, colors.orange, colors.red], borderRadius: 5 }]
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } } }
      });
    }
  </script>
</body>
</html>
